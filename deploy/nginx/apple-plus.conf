# Apple Plus — host nginx vhost config
#
# This server already runs nginx on :80 for another project. Nginx routes
# by Host header (server_name), so this vhost can sit alongside the other
# one without freeing up port 80 — just don't mark either block as
# `default_server` if you want to keep the existing default behaviour.
#
# Install:
#   sudo cp deploy/nginx/apple-plus.conf /etc/nginx/sites-available/apple-plus.conf
#   sudo ln -s /etc/nginx/sites-available/apple-plus.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Matches docker-compose.prod.yml host ports: web=3001, api=4001 (NestJS
# global prefix is /api/v1, socket.io runs on the same API port).

server {
    listen 80;
    listen [::]:80;
    server_name vps8759.eskiz.uz;

    # NestJS API
    location /api/ {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (orders gateway) — needs the Upgrade headers for websockets
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js web (everything else)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
